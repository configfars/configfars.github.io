<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="qrcode.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(145deg,#0f172a,#1e293b);
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:420px;
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(12px);
            border-radius:40px;
            padding:28px;
            box-shadow:0 20px 40px rgba(0,0,0,.35);
        }

        h2{
            color:#fff;
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:18px;
            font-size:16px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:18px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
            color:#fff;
            transition:.2s;
        }

        button:active{
            transform:scale(.97);
        }

        .qr-wrapper{
            display:flex;
            justify-content:center;
            margin-top:25px;
            padding:20px;
            background:#fff;
            border-radius:30px;
        }

        #qrcode canvas,
        #qrcode img{
            border-radius:18px;
        }

        .badge{
            text-align:center;
            margin-top:18px;
            color:#cbd5e1;
            font-size:14px;
        }

        @keyframes pulse{
            0%{box-shadow:0 0 0 0 rgba(59,130,246,.4);}
            70%{box-shadow:0 0 0 15px rgba(59,130,246,0);}
            100%{box-shadow:0 0 0 0 rgba(59,130,246,0);}
        }

        .qr-wrapper{
            animation:pulse 2s infinite;
        }
    </style>

    <script>

        var qr;

        function generateQR(){

            var text=document.getElementById("qrText").value.trim();

            if(text==""){
                alert("لطفاً متن یا لینک را وارد کنید.");
                return;
            }

            document.getElementById("qrcode").innerHTML="";

            qr=new QRCode(document.getElementById("qrcode"),{
                text:text,
                width:260,
                height:260,
                colorDark:"#0f172a",
                colorLight:"#ffffff",
                correctLevel:QRCode.CorrectLevel.H
            });

            setTimeout(getCanvasImage,300);

        }

        function getCanvasImage(){

            var canvas=document.querySelector("#qrcode canvas");

            if(canvas){

                var imageData=canvas.toDataURL("image/png");

                if(typeof Android!="undefined"){
                    Android.setImageData(imageData);
                }

            }

        }

    </script>

</head>

<body>

<div class="card">

    <h2>🔥 QR Code Generator 🔥</h2>

    <input
        id="qrText"
        type="text"
        placeholder="متن یا لینک را وارد کنید..."
    >

    <button onclick="generateQR()">
        🚀 ساخت QR Code
    </button>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>

    <div class="badge">
        📡 آماده ساخت
    </div>

</div>

</body>
</html>
