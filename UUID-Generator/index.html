<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UUID Generator | CONFIGFARS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#050816;
}

/* Background */
body::before{
    content:"";
    position:absolute;
    width:420px;
    height:420px;
    border-radius:50%;
    background:#0066ff;
    filter:blur(140px);
    top:-120px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:420px;
    height:420px;
    border-radius:50%;
    background:#8b5cf6;
    filter:blur(140px);
    bottom:-120px;
    right:-120px;
}

.card{
    position:relative;
    z-index:10;

    width:90%;
    max-width:750px;

    padding:35px;

    border-radius:25px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 0 40px rgba(0,0,0,.45);
}

.logo{

    width:75px;
    height:75px;

    margin:auto;

    border-radius:50%;

    background:linear-gradient(135deg,#0077ff,#8b5cf6);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:28px;

    margin-bottom:20px;
}

h1{
    text-align:center;
    color:white;
    font-size:34px;
}

.subtitle{
    text-align:center;
    color:#b6bfd6;
    margin-top:10px;
    margin-bottom:35px;
}

.uuid{

    background:#0f172a;

    border:1px solid #2b364f;

    color:#00ffb7;

    padding:18px;

    border-radius:14px;

    text-align:center;

    font-size:18px;

    word-break:break-all;

    margin-bottom:30px;

    user-select:all;
}

.buttons{

    display:flex;

    gap:15px;

    flex-wrap:wrap;
}

button{

    flex:1;

    min-width:170px;

    border:none;

    cursor:pointer;

    color:white;

    font-size:17px;

    padding:15px;

    border-radius:14px;

    transition:.25s;
}

#generate{

    background:linear-gradient(135deg,#0077ff,#00bfff);
}

#copy{

    background:linear-gradient(135deg,#16a34a,#00d084);
}

button:hover{

    transform:translateY(-4px);

    box-shadow:0 12px 25px rgba(0,0,0,.35);
}

.footer{

    margin-top:30px;

    text-align:center;

    color:#7f8da8;

    font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">
🆔
</div>

<h1>UUID Generator</h1>

<p class="subtitle">
Generate secure Version 4 UUIDs instantly.
</p>

<div class="uuid" id="uuid">
Loading...
</div>

<div class="buttons">

<button id="generate">
⚡ Generate UUID
</button>

<button id="copy">
📋 Copy UUID
</button>

</div>

<div class="footer">
Made with ❤️ by <b>CONFIGFARS</b>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
