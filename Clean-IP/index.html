<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP های تمیز</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:900px;
    background:#151515;
    border:1px solid #2d2d2d;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(0,0,0,.6);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#ffffff;
}

.sub{
    text-align:center;
    color:#9ca3af;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#00c853;
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    margin-bottom:18px;
}

button:hover{
    background:#00e676;
    transform:translateY(-2px);
}

textarea{
    width:100%;
    height:450px;
    background:#0f0f0f;
    color:#00ff84;
    border:1px solid #333;
    border-radius:15px;
    padding:15px;
    font-size:15px;
    outline:none;
    resize:vertical;
}

.footer{
    text-align:center;
    color:#777;
    margin-top:15px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<h1>🔐 IP های تمیز</h1>

<div class="sub">
برای کپی کردن روی دکمه زیر کلیک کنید
</div>

<button onclick="copyIPs()">
📋 کپی همه IP ها
</button>

<div class="footer">

</div>

</div>

<script>
function copyIPs(){
    const text=document.getElementById("ips").value;

    navigator.clipboard.writeText(text).then(()=>{
        const btn=document.querySelector("button");
        btn.innerHTML="✅ کپی شد";
        setTimeout(()=>{
            btn.innerHTML="📋 کپی همه IP ها";
        },2000);
    });
}
</script>

</body>
</html>
