<title>IP های تمیز</title>

<style>
*{

    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:900px;
    background:#151515;
    border:1px solid #2d2d2d;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(0,0,0,.6);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#ffffff;
}

.sub{
    text-align:center;
    color:#9ca3af;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#00c853;
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    margin-bottom:18px;
}

button:hover{
    background:#00e676;
    transform:translateY(-2px);
}

textarea{
    width:100%;
    height:450px;
    background:#0f0f0f;
    color:#00ff84;
    border:1px solid #333;
    border-radius:15px;
    padding:15px;
    font-size:15px;
    outline:none;
    resize:vertical;
}

.footer{
    text-align:center;
    color:#777;
    margin-top:15px;
    font-size:13px;
}
</style>
</head>

<script>
function copyIPs(){
    const text=document.getElementById("ips").value;

    navigator.clipboard.writeText(text).then(()=>{

        btn.innerHTML="✅ کپی شد";
        setTimeout(()=>{

}
